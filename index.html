<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<meta property="og:type" content="website">
<meta property="og:title" content="pure">
<meta property="og:description" content="hi im 99% pure">
<meta property="og:url" content="https://pure.wyvern.im/">

<meta property="og:image" content="https://raw.githubusercontent.com/purelyhere/purelyhere.github.io/main/pink-crown.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">

<meta name="twitter:card" content="summary">

<meta name="theme-color" content="#ff5ca8">

<title>.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

:root {
  --c1: 255,105,180;
  --c2: 255,60,140;
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #080808;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Sora', sans-serif;
  user-select: none;
  perspective: 1200px;
}

/* ───────────────── Canvas ───────────────── */

canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ───────────────── Grain ───────────────── */

.grain {
  position: fixed;
  inset: -50%;
  width: 200%;
  height: 200%;
  z-index: 1;
  pointer-events: none;
  opacity: 0.028;

  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

  animation: grainShift 0.4s steps(1) infinite;
}

@keyframes grainShift {
  0%   { transform: translate(0,0); }
  25%  { transform: translate(-2%,-1%); }
  50%  { transform: translate(1%,2%); }
  75%  { transform: translate(-1%,1%); }
  100% { transform: translate(2%,-2%); }
}

/* ───────────────── Card ───────────────── */

.card {
  position: relative;
  z-index: 10;

  display: flex;
  align-items: center;
  gap: 20px;

  padding: 24px 28px;

  border-radius: 22px;

  border: 1px solid rgba(255,255,255,0.06);

  background:
    linear-gradient(
      to bottom right,
      rgba(255,255,255,0.035),
      rgba(255,255,255,0.015)
    );

  backdrop-filter:
    blur(14px)
    saturate(140%);

  box-shadow:
    0 0 50px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.03);

  overflow: hidden;

  transform-style: preserve-3d;
  will-change: transform;

  opacity: 0;

  animation:
    cardReveal 1.8s cubic-bezier(0.16,1,0.3,1) forwards;
}

.card::before {
  content: '';

  position: absolute;
  inset: 0;

  background:
    linear-gradient(
      120deg,
      transparent 20%,
      rgba(255,255,255,0.03) 50%,
      transparent 80%
    );

  pointer-events: none;
}

@keyframes cardReveal {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0px) scale(1);
  }
}

/* ───────────────── Avatar ───────────────── */

.avatar-link {
  width: 58px;
  height: 58px;

  border-radius: 50%;

  overflow: hidden;

  flex-shrink: 0;

  border: 0.5px solid rgba(255,255,255,0.07);

  box-shadow:
    0 0 25px rgba(var(--c1), 0.22),
    0 0 70px rgba(var(--c2), 0.12);

  transition:
    transform 0.35s ease,
    opacity 0.25s ease,
    box-shadow 0.35s ease;

  opacity: 0;
  transform: scale(0.92);

  animation:
    avatarIn 1.2s ease forwards;

  animation-delay: 0.45s;
}

.avatar-link:hover {
  transform: scale(1.05);

  box-shadow:
    0 0 35px rgba(var(--c1), 0.30),
    0 0 100px rgba(var(--c2), 0.16);
}

@keyframes avatarIn {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.avatar-link img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.fallback {
  width: 100%;
  height: 100%;
  background: #1c1c1c;

  display: flex;
  align-items: center;
  justify-content: center;
}

.fallback svg {
  width: 26px;
  height: 26px;
  fill: #3a3a3a;
}

/* ───────────────── Text ───────────────── */

.info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.name-row {
  display: flex;
  align-items: center;
  gap: 9px;
}

.username {
  font-family: 'Space Mono', monospace;
  font-size: 17px;
  font-weight: 700;

  color: #c4c4c0;

  letter-spacing: 0.03em;

  opacity: 0;
  transform: translateY(5px);

  animation:
    textIn 1s ease forwards;

  animation-delay: 0.8s;
}

.handle {
  font-size: 13px;
  font-weight: 300;

  color: #666;

  opacity: 0;
  transform: translateY(5px);

  animation:
    textIn 1s ease forwards;

  animation-delay: 1s;
}

@keyframes textIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ───────────────── Badges ───────────────── */

.badges {
  display: flex;
  gap: 5px;
  align-items: center;

  opacity: 0;
  transform: scale(0.9);

  animation:
    badgesIn 1s ease forwards;

  animation-delay: 1.15s;
}

.badges svg {
  width: 15px;
  height: 15px;

  fill: none;

  stroke: #3a3a3a;
  stroke-width: 1.5;

  opacity: 0.7;
}

@keyframes badgesIn {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="grain"></div>

<script>

/* ───────────────── CONFIG ───────────────── */

const DISCORD_AVATAR_URL =
'https://cdn.discordapp.com/avatars/385861858495692801/5b96fcf74db28116bd40caaa1549b8dd.png?size=512';

const USERNAME = 'pure';

const HANDLE = '/purelyawake';

const AUDIO_URL =
'https://raw.githubusercontent.com/purelyhere/purelyhere.github.io/main/GoodLuckBabe.mp3';

/* 0.0 -> 1.0 */
const AUDIO_VOLUME = 0.15;

/* LOCKED pink palette */
const FORCE_PINK_THEME = true;

/* rotating title lines */
const TITLE_LINES = [
  'pure',
  'purelyawake',
  'how did you find me?',
  'we all go at some point',
  'music is amazing',
  'lost somewhere',
  'hi there!'
];

</script>

<div class="card">

  <a
    class="avatar-link"
    id="avatar-link"
    href="#"
    target="_blank"
    rel="noopener"
  >

    <div class="fallback" id="fallback">
      <svg viewBox="0 0 24 24">
        <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-3.333 0-10 1.667-10 5v2h20v-2c0-3.333-6.667-5-10-5z"/>
      </svg>
    </div>

  </a>

  <div class="info">

    <div class="name-row">

      <span class="username" id="uname"></span>

      <div class="badges">

        <svg viewBox="0 0 24 24">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>

        <svg viewBox="0 0 24 24">
          <path d="M3 6l9-4 9 4v6c0 5.55-3.84 10.74-9 12-5.16-1.26-9-6.45-9-12V6z"/>
        </svg>

      </div>

    </div>

    <span class="handle" id="handle"></span>

  </div>

</div>

<script>

/* ───────────────── Setup ───────────────── */

document.getElementById('uname').textContent = USERNAME;
document.getElementById('handle').textContent = HANDLE;

const avatarLink = document.getElementById('avatar-link');
const fallbackEl = document.getElementById('fallback');

let palette = {
  c1: { r:255, g:105, b:180 },
  c2: { r:255, g:60, b:140 }
};

document.documentElement.style.setProperty(
  '--c1',
  `${palette.c1.r}, ${palette.c1.g}, ${palette.c1.b}`
);

document.documentElement.style.setProperty(
  '--c2',
  `${palette.c2.r}, ${palette.c2.g}, ${palette.c2.b}`
);

/* ───────────────── Avatar ───────────────── */

if (DISCORD_AVATAR_URL) {

  avatarLink.href = DISCORD_AVATAR_URL;

  const img = new Image();

  img.crossOrigin = 'anonymous';

  img.onload = () => {

    fallbackEl.remove();

    avatarLink.appendChild(img);

  };

  img.src = DISCORD_AVATAR_URL;
}

/* ───────────────── Dynamic Title ───────────────── */

let titleIndex = 0;
let charIndex = 0;
let deleting = false;

async function titleLoop() {

  const current = TITLE_LINES[titleIndex];

  if (!deleting) {

    charIndex++;

    document.title =
      current.substring(0, charIndex) + '.';

    if (charIndex >= current.length) {

      deleting = true;

      await wait(2200);
    }

  } else {

    charIndex--;

    if (charIndex <= 0) {

      document.title = '.';

      deleting = false;

      titleIndex =
        Math.floor(Math.random() * TITLE_LINES.length);

    } else {

      document.title =
        current.substring(0, charIndex) + '.';
    }
  }

  setTimeout(
    titleLoop,
    deleting ? 55 : 110
  );
}

function wait(ms) {
  return new Promise(r => setTimeout(r, ms));
}

titleLoop();

/* ───────────────── Mouse Parallax ───────────────── */

let mx = 0;
let my = 0;

const card = document.querySelector('.card');

window.addEventListener('mousemove', e => {

  mx = (e.clientX / innerWidth - 0.5);
  my = (e.clientY / innerHeight - 0.5);

});

function parallaxLoop() {

  card.style.transform = `
    translate3d(${mx * 10}px, ${my * 10}px, 0)
    rotateX(${my * -5}deg)
    rotateY(${mx * 5}deg)
  `;

  requestAnimationFrame(parallaxLoop);
}

parallaxLoop();

/* ───────────────── Audio ───────────────── */

let analyser;
let freqData;
let audioReady = false;
let audioStrength = 0;

window.addEventListener('click', async () => {

  if (audioReady || !AUDIO_URL) return;

  const audio = new Audio(AUDIO_URL);

  audio.crossOrigin = 'anonymous';
  audio.loop = true;

  audio.volume = AUDIO_VOLUME;

  const ctxAudio =
    new (window.AudioContext || window.webkitAudioContext)();

  const src =
    ctxAudio.createMediaElementSource(audio);

  analyser = ctxAudio.createAnalyser();

  analyser.fftSize = 256;

  src.connect(analyser);
  analyser.connect(ctxAudio.destination);

  freqData =
    new Uint8Array(analyser.frequencyBinCount);

  await audio.play();

  audioReady = true;
});

/* ───────────────── Canvas ───────────────── */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, puffs = [], t = 0;

function resize() {

  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;

  buildPuffs();
}

function buildPuffs() {

  puffs = [];

  const n =
    Math.floor(W * H / 13000);

  for (let i = 0; i < n; i++) {

    puffs.push({

      cx: Math.random() * W,

      cy:
        H * 0.2 +
        Math.random() * H * 0.85,

      r:
        40 + Math.random() * 240,

      depth:
        Math.random(),

      side:
        Math.random() < 0.5 ? 1 : 2,

      bri:
        0.08 + Math.random() * 0.20,

      dx:
        (Math.random() - 0.5) * 0.07,

      dy:
        (Math.random() - 0.5) * 0.025,

      phase:
        Math.random() * Math.PI * 2
    });
  }
}

function dim(c, f) {

  return `
    ${Math.round(c.r*f)},
    ${Math.round(c.g*f)},
    ${Math.round(c.b*f)}
  `;
}

function drawFrame() {

  ctx.clearRect(0,0,W,H);

  const bg =
    ctx.createLinearGradient(0,0,W,H);

  bg.addColorStop(
    0,
    `rgba(${dim(palette.c1,0.08)},1)`
  );

  bg.addColorStop(
    1,
    `rgba(${dim(palette.c2,0.08)},1)`
  );

  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  if (audioReady && analyser) {

    analyser.getByteFrequencyData(freqData);

    let sum = 0;

    for (let i = 0; i < freqData.length; i++) {
      sum += freqData[i];
    }

    audioStrength =
      sum / freqData.length / 255;
  }

  ctx.globalCompositeOperation = 'screen';

  for (const p of puffs) {

    const pulse =
      Math.sin(t * 0.0006 + p.phase) * 3 +
      audioStrength * 40;

    const col =
      p.side === 1
      ? palette.c1
      : palette.c2;

    const grd =
      ctx.createRadialGradient(
        p.cx,p.cy,0,
        p.cx,p.cy,p.r+pulse
      );

    grd.addColorStop(
      0,
      `rgba(${dim(
        col,
        p.bri * (0.9 + audioStrength * 1.5)
      )},${0.2 + p.depth * 0.35})`
    );

    grd.addColorStop(
      0.4,
      `rgba(${dim(col,p.bri * 0.45)},0.18)`
    );

    grd.addColorStop(
      1,
      `rgba(0,0,0,0)`
    );

    ctx.beginPath();

    ctx.ellipse(
      p.cx,
      p.cy,
      p.r + pulse,
      (p.r + pulse) * 0.52,
      0,
      0,
      Math.PI * 2
    );

    ctx.fillStyle = grd;
    ctx.fill();

    p.cx += p.dx * (0.3 + p.depth * 1.2);
    p.cy += p.dy * (0.3 + p.depth * 1.2);

    if (p.cx < -p.r) p.cx = W + p.r;
    if (p.cx > W+p.r) p.cx = -p.r;

    if (p.cy < H*0.1)
      p.dy = Math.abs(p.dy);

    if (p.cy > H*1.1)
      p.dy = -Math.abs(p.dy);
  }

  ctx.globalCompositeOperation = 'source-over';

  const vg =
    ctx.createRadialGradient(
      W/2,H/2,H*0.28,
      W/2,H/2,H*0.9
    );

  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.65)');

  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);

  t++;

  requestAnimationFrame(drawFrame);
}

window.addEventListener('resize', resize);

resize();
drawFrame();

</script>
</body>
</html>
