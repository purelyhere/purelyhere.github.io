<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Start Page</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#020202;
  --surface:rgba(255,255,255,0.025);
  --surface-focus:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.06);
  --border-focus:rgba(255,255,255,0.12);

  --text:rgba(255,255,255,0.90);
  --text-muted:rgba(255,255,255,0.38);
  --text-dim:rgba(255,255,255,0.20);

  --purple:#7c3aed;
  --blue:#2563eb;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'DM Mono',monospace;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  animation:fadeIn .9s ease;
}

body::before,
body::after{
  content:"";
  position:absolute;
  width:42vw;
  height:42vw;
  border-radius:50%;
  filter:blur(150px);
  opacity:.07;
  pointer-events:none;
  animation:drift 20s ease-in-out infinite;
}

body::before{
  background:var(--purple);
  top:-18%;
  left:-12%;
}

body::after{
  background:var(--blue);
  bottom:-22%;
  right:-12%;
  animation-delay:-10s;
}

@keyframes drift{
  0%{
    transform:translate(0,0) scale(1);
  }
  33%{
    transform:translate(20px,-18px) scale(1.05);
  }
  66%{
    transform:translate(-10px,12px) scale(.97);
  }
  100%{
    transform:translate(0,0) scale(1);
  }
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.search-wrap{
  width:min(760px,88vw);
  position:relative;
  animation:fadeIn 1s ease both;
}

.search-container{
  display:flex;
  align-items:center;
  gap:12px;

  height:66px;
  padding:0 20px;

  border-radius:20px;

  background:var(--surface);
  border:1px solid var(--border);

  box-shadow:
    0 12px 44px rgba(0,0,0,0.70),
    inset 0 1px 0 rgba(255,255,255,0.04),
    inset 0 -1px 0 rgba(0,0,0,0.3);

  transition:
    background .26s,
    border-color .26s,
    transform .26s,
    box-shadow .26s;
}

.search-container:focus-within{
  background:var(--surface-focus);
  border-color:var(--border-focus);

  transform:translateY(-2px);

  box-shadow:
    0 18px 54px rgba(0,0,0,0.78),
    0 0 44px rgba(124,58,237,0.09),
    inset 0 1px 0 rgba(255,255,255,0.06);

  backdrop-filter:blur(32px) saturate(160%);
  -webkit-backdrop-filter:blur(32px) saturate(160%);
}

.search-container.pressed{
  transform:translateY(1px) scale(0.992) !important;

  box-shadow:
    0 6px 24px rgba(0,0,0,0.70),
    inset 0 1px 0 rgba(255,255,255,0.03) !important;

  transition:
    transform .08s ease,
    box-shadow .08s ease !important;
}

.search-icon{
  flex-shrink:0;

  display:flex;
  align-items:center;
  justify-content:center;

  color:var(--text-dim);
  transition:color .26s;
}

.search-container:focus-within .search-icon{
  color:var(--text-muted);
}

.search-icon svg{
  width:18px;
  height:18px;

  stroke:currentColor;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
}

.search{
  width:100%;
  height:100%;

  border:none;
  outline:none;
  background:transparent;

  color:var(--text);

  font-size:1rem;
  font-family:'DM Mono',monospace;
  letter-spacing:.01em;
}

.search::placeholder{
  color:var(--text-muted);
}

::selection{
  background:rgba(124,58,237,.35);
  color:white;
}

.browser-info{
  position:fixed;
  bottom:22px;
  left:22px;

  font-size:.65rem;
  letter-spacing:.08em;
  color:var(--text-dim);

  display:flex;
  align-items:center;
  gap:6px;

  text-transform:uppercase;

  animation:fadeIn 1.2s ease both;
  animation-delay:.3s;

  pointer-events:none;
}

.browser-dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:rgba(124,58,237,0.5);
  flex-shrink:0;
}

.vpn-info{
  position:fixed;
  bottom:22px;
  right:22px;

  font-size:.65rem;
  letter-spacing:.08em;
  color:var(--text-dim);

  display:flex;
  align-items:center;
  gap:6px;

  text-transform:uppercase;

  animation:fadeIn 1.2s ease both;
  animation-delay:.3s;

  pointer-events:none;
}

.vpn-dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:rgba(124,58,237,0.5);
  flex-shrink:0;
}
</style>
</head>

<body>

<div class="search-wrap">
  <div class="search-container">

    <div class="search-icon">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="22" y2="22"/>
      </svg>
    </div>

    <input
      class="search"
      type="text"
      placeholder="search the web..."
      autofocus
      spellcheck="false"
      onkeydown="handleSearch(event,this)"
    />

  </div>
</div>

<div class="browser-info">
  <div class="browser-dot"></div>
  <span>LibreWolf</span>
</div>

<div class="vpn-info">
  <span>use mullvad!</span>
  <div class="vpn-dot"></div>
</div>

<script>
function handleSearch(event, input){

  if(event.key !== 'Enter') return;

  const container = input.closest('.search-container');

  container.classList.add('pressed');

  let value = input.value.trim();

  if(!value) return;

  setTimeout(() => {

    // Already full URL
    if(/^https?:\/\//i.test(value)){
      window.location.href = value;
      return;
    }

    // Domain detection
    const domainRegex =
      /^([a-z0-9-]+\.)+[a-z]{2,}([\/?#].*)?$/i;

    // localhost support
    const localhostRegex =
      /^localhost(:\d+)?([\/?#].*)?$/i;

    // IP support
    const ipRegex =
      /^(\d{1,3}\.){3}\d{1,3}(:\d+)?([\/?#].*)?$/;

    if(
      domainRegex.test(value) ||
      localhostRegex.test(value) ||
      ipRegex.test(value)
    ){
      window.location.href = 'https://' + value;
      return;
    }

    // Quick shortcuts
    const shortcuts = {
      yt: query =>
        'https://www.youtube.com/results?search_query=' +
        encodeURIComponent(query),

      ytt: () =>
        'https://www.youtube.com',

      gh: query =>
        'https://github.com/search?q=' +
        encodeURIComponent(query),

      r: query =>
        'https://www.reddit.com/search/?q=' +
        encodeURIComponent(query),

      g: query =>
        'https://www.google.com/search?q=' +
        encodeURIComponent(query),

      ddg: query =>
        'https://duckduckgo.com/?q=' +
        encodeURIComponent(query)
    };

    const parts = value.split(' ');
    const command = parts[0].toLowerCase();

    // ytt works alone (no query needed)
    if(command === 'ytt'){
      window.location.href = 'https://www.youtube.com';
      return;
    }

    if(shortcuts[command] && parts.length > 1){
      const query = parts.slice(1).join(' ');
      window.location.href = shortcuts[command](query);
      return;
    }

    // Default search
    window.location.href =
      'https://duckduckgo.com/?q=' +
      encodeURIComponent(value);

  }, 120);
}
</script>

</body>
</html>
